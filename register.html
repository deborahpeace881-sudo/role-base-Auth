<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Role-Based Authentication</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-google {
            border: 1px solid #ddd;
            border-radius: 50px;
            padding: 10px;
            background: white;
            transition: all 0.3s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
        .password-strength {
            height: 5px;
            margin-top: 8px;
            border-radius: 5px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5" data-aos="fade-up">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-2">Create Account</h2>
                        <p class="text-muted">Join our secure platform today</p>
                    </div>
                    
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="password-strength bg-secondary" id="passwordStrength"></div>
                            <small class="text-muted" id="strengthText"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <select class="form-select" id="role" required>
                                <option value="">Select Role</option>
                                <option value="user">User</option>
                                <option value="manager">Manager</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label" for="terms">
                                I agree to the <a href="#" class="text-decoration-none">Terms & Conditions</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-register w-100 mb-3" id="registerBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="registerSpinner"></span>
                            <span id="registerText">Register</span>
                        </button>
                        
                        <div class="text-center mb-3">
                            <span class="text-muted">or</span>
                        </div>
                        
                        <button type="button" class="btn btn-google w-100 mb-3" id="googleRegister">
                            <img src="https://www.google.com/favicon.ico" width="20" class="me-2">
                            Continue with Google
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted">Already have an account? 
                                <a href="login.html" class="text-decoration-none">Login</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.35/ua-parser.min.js"></script>
    
    <script src="config.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    
    <script>
        AOS.init();
        
        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user && user.emailVerified) {
                window.location.href = 'dashboard.html';
            }
        });
    // Replace the existing registration script with this
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const role = document.getElementById('role').value;
        const terms = document.getElementById('terms').checked;
        
        // Validation
        if (password !== confirmPassword) {
            Swal.fire('Error', 'Passwords do not match', 'error');
            return;
        }
        
        if (!terms) {
            Swal.fire('Error', 'Please accept terms and conditions', 'error');
            return;
        }
        
        if (password.length < 6) {
            Swal.fire('Error', 'Password must be at least 6 characters', 'error');
            return;
        }
        
        // Show loading
        Swal.fire({
            title: 'Creating Account',
            text: 'Please wait...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });
        
        try {
            // Create user in Firebase Authentication
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            console.log('User created:', user.uid); // Debug log
            
            // Send email verification
            await user.sendEmailVerification();
            
            // Create user document in Firestore
            await db.collection('users').doc(user.uid).set({
                uid: user.uid,
                email: user.email,
                role: role,
                displayName: '',
                phoneNumber: '',
                location: '',
                bio: '',
                accountStatus: 'active',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                emailVerified: false
            });
            
            console.log('User document created in Firestore');
            
            // Create login log
            await db.collection('loginLogs').add({
                userId: user.uid,
                email: user.email,
                action: 'registration',
                status: 'success',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            Swal.fire({
                icon: 'success',
                title: 'Registration Successful!',
                text: 'Please check your email to verify your account. You will be redirected to login page.',
                timer: 3000
            });
            
            // Redirect to login page after 3 seconds
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
            
        } catch (error) {
            console.error('Registration error:', error);
            
            let errorMessage = error.message;
            
            // Handle specific Firebase errors
            if (error.code === 'auth/email-already-in-use') {
                errorMessage = 'This email is already registered. Please login instead.';
            } else if (error.code === 'auth/invalid-email') {
                errorMessage = 'Invalid email address.';
            } else if (error.code === 'auth/weak-password') {
                errorMessage = 'Password is too weak. Please use a stronger password.';
            }
            
            Swal.fire({
                icon: 'error',
                title: 'Registration Failed',
                text: errorMessage
            });
        }
    });
    </script>
</body>
</html>
