<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Role-Based Authentication</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-google {
            border: 1px solid #ddd;
            border-radius: 50px;
            padding: 10px;
            background: white;
            transition: all 0.3s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5" data-aos="fade-up">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-2">Welcome Back</h2>
                        <p class="text-muted">Please login to your account</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                        </div>
                        
                        <div class="mb-3 text-end">
                            <a href="#" id="forgotPassword" class="text-decoration-none">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-login w-100 mb-3" id="loginBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
                            <span id="loginText">Login</span>
                        </button>
                        
                        <div class="text-center mb-3">
                            <span class="text-muted">or</span>
                        </div>
                        
                        <button type="button" class="btn btn-google w-100 mb-3" id="googleLogin">
                            <img src="https://www.google.com/favicon.ico" width="20" class="me-2">
                            Continue with Google
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted">Don't have an account? 
                                <a href="register.html" class="text-decoration-none">Sign Up</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.35/ua-parser.min.js"></script>
    
    <script src="config.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    
    <script>
        AOS.init();
        
        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user && user.emailVerified) {
                window.location.href = 'dashboard.html';
            }
        });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Show loading
        Swal.fire({
            title: 'Logging in',
            text: 'Please wait...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            console.log('User logged in:', user.uid); // Debug log
            
            // Check if email is verified
            if (!user.emailVerified) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Email Not Verified',
                    text: 'Please verify your email before logging in. Check your inbox for verification link.',
                    showCancelButton: true,
                    confirmButtonText: 'Resend Verification',
                    cancelButtonText: 'OK'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await user.sendEmailVerification();
                        Swal.fire('Success', 'Verification email sent!', 'success');
                    }
                });
                return;
            }
            
            // Update last login in Firestore
            await db.collection('users').doc(user.uid).update({
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // Create login log
            await db.collection('loginLogs').add({
                userId: user.uid,
                email: user.email,
                action: 'login',
                status: 'success',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            Swal.fire({
                icon: 'success',
                title: 'Login Successful',
                text: 'Redirecting to dashboard...',
                timer: 1500
            });
            
            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
            
        } catch (error) {
            console.error('Login error:', error);
            
            let errorMessage = error.message;
            
            if (error.code === 'auth/user-not-found') {
                errorMessage = 'No account found with this email. Please register first.';
            } else if (error.code === 'auth/wrong-password') {
                errorMessage = 'Incorrect password. Please try again.';
            } else if (error.code === 'auth/invalid-email') {
                errorMessage = 'Invalid email address.';
            } else if (error.code === 'auth/user-disabled') {
                errorMessage = 'This account has been disabled.';
            }
            
            Swal.fire({
                icon: 'error',
                title: 'Login Failed',
                text: errorMessage
            });
        }
    });
    </script>
</body>
</html>
